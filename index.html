<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Ganesha Game</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://app.embed.im/snow.js" defer></script>
  <script src="https://app.embed.im/sparkles.js" defer></script>

  <style>
    body {
      margin: 0;
      font-family: 'Comic Sans MS', sans-serif;
      background: url('Assets/Bg.png') center/cover no-repeat;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* CINEMATIC OVERLAY */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom,
          rgba(0, 0, 0, 0.2),
          rgba(0, 0, 0, 0.5));
    }

    /* WRAPPER */
    .wrapper {
      position: relative;
      width: 1200px;
      height: 520px;
      display: flex;
      flex-direction: row-reverse;
      justify-content: space-between;
      align-items: center;
    }

    #effects-layer {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    /* GANESHA */
    .ganesha {
      position: relative;
      width: 320px;
      z-index: 5;
      transition: transform 0.3s ease;
      margin-left: 30px;
    }

    /* GLOW */
    .ganesha-glow {
      position: absolute;
      left: 40px;
      bottom: 40px;
      width: 260px;
      height: 120px;
      background: radial-gradient(circle, rgba(255, 200, 100, 0.5), transparent);
      filter: blur(20px);
      z-index: 4;
    }

    /* CARD */
    .card {
      width: 100%;
      background: rgba(255, 248, 230, 0.97);
      border-radius: 25px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      text-align: center;
      transition: transform 0.3s ease;
    }

    .card-layout {
      display: flex;
      gap: 35px;
      align-items: center;
    }

    /* LEFT SIDE (IMAGE) */
    .left {
      width: 40%;
    }

    /* QUESTION */
    .question {
      font-size: 26px;
      margin-bottom: 25px;
      color: #333;
    }

    .top-row {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .scene-img {
      width: 100%;
      height: 500px;
      /* max-height: 140px; */
      /* object-fit: contain; */
      object-fit: cover;
      /* margin: 10px auto 20px; */
      margin: 0;
      display: block;
      /* border-radius: 15px; */
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      opacity: 0;
      transform: scale(0.95);
      transition: all 0.3s ease;
      filter: blur(6px);
    }

    .scene-img.show {
      opacity: 1;
      filter: blur(0px);
      transform: scale(1);
      animation: float 3s ease-in-out infinite;
    }

    /* RIGHT SIDE (TEXT + OPTIONS) */
    .right {
      width: 60%;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Question right */
    .question {
      font-size: 24px;
      text-align: left;
      margin: 0;
      margin-bottom: 50px;
    }

    @keyframes float {
      0% {
        transform: scale(1) translateY(0px);
      }

      50% {
        transform: scale(1.02) translateY(-5px);
      }

      100% {
        transform: scale(1) translateY(0px);
      }
    }

    /* OPTIONS */
    .options {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .option {
      text-align: center;
      flex: 1;
      padding: 16px;
      background: linear-gradient(145deg, #ffc46b, #ffa726);
      border-radius: 25px;
      cursor: pointer;
      font-size: 19px;
      transition: 0.3s;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
    }

    .option:hover {
      transform: translateY(-5px);
    }

    .correct {
      background: #81c784 !important;
    }

    .wrong {
      background: #e57373 !important;
    }

    @keyframes pop {
      0% {
        transform: scale(0);
      }

      100% {
        transform: scale(1);
      }
    }

    /* PROGRESS */
    .progress {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .step {
      width: 25px;
      height: 6px;
      border-radius: 10px;
      background: #ddd;
    }

    .active {
      background: #ff9800;
    }

    /* RESULT */
    .result {
      font-size: 32px;
    }

    .btn {
      margin-top: 20px;
      padding: 10px 25px;
      border-radius: 20px;
      border: none;
      background: #ff9800;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    /* GANESHA REACTIONS */
    .jump {
      /* transform: translateX(50%) translateY(-20px); */
      transform: translateY(-50px);
    }

    .sad {
      /* transform: translateX(50%) rotate(-8deg); */
      animation: shake 0.5s;
      animation: shake 0.5s;
    }

    @keyframes shake {
      0% {
        transform: translate(0, 0);
      }

      20% {
        transform: translate(-5px, 0);
      }

      40% {
        transform: translate(5px, 0);
      }

      60% {
        transform: translate(-4px, 0);
      }

      80% {
        transform: translate(4px, 0);
      }

      100% {
        transform: translate(0, 0);
      }
    }

    .shake {
      animation: shake 0.5s;
    }

    .flash {
      animation: flashRed 0.25s;
    }

    @keyframes flashRed {
      0% {
        background-color: rgba(255, 0, 0, 0.0);
      }

      50% {
        background-color: rgba(255, 0, 0, 0.25);
      }

      100% {
        background-color: rgba(255, 0, 0, 0.0);
      }
    }

    .result-screen {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 20;
    }

    .hidden {
      display: none;
    }

    .result-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }

    .result-ganesha {
      width: 300px;
      animation: float 3s ease-in-out infinite;
    }

    #stars {
      font-size: 40px;
      margin-bottom: 10px;
      animation: pop 0.4s ease;
    }

    #result-text {
      font-size: 36px;
      color: white;
      margin-bottom: 20px;
      text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
    }


    /* 🎈 BALLOONS CONTAINER */
    #balloons-container {
      position: fixed;
      /* 🔥 THIS IS THE FIX */
      width: 100%;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
      z-index: 15;
    }

    /* 🎈 SINGLE BALLOON */
    .balloon {
      position: absolute;
      bottom: -100px;
      border-radius: 50%;
      opacity: 0.95;

      /* 🎨 3D LOOK */
      background: radial-gradient(circle at 30% 30%, #ffffffaa, transparent 40%), var(--color);

      /* 🎭 depth blur */
      filter: blur(var(--blur));

      /* 🎈 animation */
      animation: floatUp var(--duration) linear forwards;
    }

    /* 🎈 STRING */
    .balloon::after {
      content: "";
      position: absolute;
      width: 2px;
      height: 40px;
      background: rgba(255, 255, 255, 0.7);
      left: 50%;
      top: 100%;
      transform: translateX(-50%);
    }

    /* 🎈 FLOAT ANIMATION */
    @keyframes floatUp {
      0% {
        transform: translateY(0) translateX(0) scale(1);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      100% {
        transform: translateY(-120vh) translateX(var(--drift)) scale(1.1);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <div class="wrapper">
    <div id="effects-layer"></div>

    <div class="ganesha-glow"></div>
    <img src="Assets/BAL GANESHA.png" class="ganesha" id="ganesha">

    <div class="card" id="card">
      <div class="card-layout">

        <!-- LEFT: IMAGE -->
        <div class="left">
          <img id="scene" class="scene-img" />
        </div>

        <!-- RIGHT: CONTENT -->
        <div class="right">
          <div class="question" id="question"></div>
          <div class="options" id="options"></div>
        </div>

      </div>
      <div class="progress" id="progress"></div>
    </div>

    <div id="result-screen" class="result-screen hidden">
      <div id="balloons-container"></div>
      <div class="result-content">

        <div id="stars"></div>
        <div id="result-text"></div>

        <img src="Assets/celebrating.png" class="result-ganesha" id="result-ganesha">

      </div>
    </div>

  </div>

  <!-- 🔊 AUDIO SYSTEM -->
  <audio id="bg-music" src="Assets/Bg.mp3" loop preload="auto"></audio>
  <audio id="correct-sound" src="Assets/right.mp3"></audio>
  <audio id="wrong-sound" src="Assets/wrong.mp3"></audio>
  <audio id="cheer-sound" src="Assets/cheer2.mp3"></audio>
  <audio id="result-sound" src="Assets/result.mp3"></audio>

  <script>
    const quiz = [
      {
        q: "Someone takes your toy without asking. What would you do?",
        img: "Assets/q1v.png",
        options: [
          { text: "Ask for it back politely", correct: true },
          { text: "Take it back with force", correct: false }
        ]
      },
      {
        q: "Your mother says 'Do homework', friend says 'play'. What do you do?",
        img: "Assets/q2v.png",
        options: [
          { text: "Finish homework first", correct: true },
          { text: "Go play immediately", correct: false }
        ]
      },
      {
        q: "Someone knocks but parents said don't open. What do you do?",
        img: "Assets/q3v.png",
        options: [
          { text: "Call an adult", correct: true },
          { text: "Let them in", correct: false }
        ]
      },
      {
        q: "You see friends fighting. What do you do?",
        img: "Assets/q4v.png",
        options: [
          { text: "Call teacher", correct: true },
          { text: "Watch quietly", correct: false }
        ]
      }

    ];

    let current = 0;
    let score = 0;

    // 🔊 AUDIO CONTROLS
    const bgMusic = document.getElementById("bg-music");
    const correctSound = document.getElementById("correct-sound");
    const wrongSound = document.getElementById("wrong-sound");
    const resultSound = document.getElementById("result-sound");

    // volume tuning (important for premium feel)
    bgMusic.volume = 0.02;
    correctSound.volume = 0.05;
    wrongSound.volume = 0.5;
    resultSound.volume = 0.02;

    // prevent overlap glitch
    function playSound(sound) {
      sound.currentTime = 0;
      sound.play();
    }

    function renderProgress() {
      const container = document.getElementById("progress");
      container.innerHTML = "";
      quiz.forEach((_, i) => {
        const step = document.createElement("div");
        step.className = "step";
        if (i <= current) step.classList.add("active");
        container.appendChild(step);
      });
    }

    function shuffle(arr) {
      return arr.sort(() => Math.random() - 0.5);
    }

    function animateGanesha(type) {
      const g = document.getElementById("ganesha");
      g.classList.remove("jump", "sad");

      if (type === "correct") {
        g.classList.add("jump");
      } else {
        g.classList.add("sad");
      }

      setTimeout(() => g.classList.remove("jump", "sad"), 600);
    }

    function setGaneshaMood(mood) {
      const g = document.getElementById("ganesha");

      const moods = {
        idle: "Assets/ganesha.png",
        happy: "Assets/happy.png",
        sad: "Assets/sad.png",
        thinking: "Assets/thinking.png",
        celebrate: "Assets/celebrating.png"
      };

      if (moods[mood]) {
        g.src = moods[mood];
      }
    }

    function loadQuestion() {
      const card = document.getElementById("card");
      card.style.transform = "scale(0.95)";
      setTimeout(() => card.style.transform = "scale(1)", 150);

      renderProgress();

      const q = quiz[current];
      setGaneshaMood("thinking");
      document.getElementById("question").innerText = q.q;

      const scene = document.getElementById("scene");
      scene.classList.remove("show");
      scene.src = q.img;

      setTimeout(() => {
        scene.classList.add("show");
      }, 50);

      const optionsDiv = document.getElementById("options");
      optionsDiv.innerHTML = "";

      shuffle(q.options).forEach(option => {
        const btn = document.createElement("div");
        btn.className = "option";
        btn.innerText = option.text;

        btn.onclick = (e) => {

          if (bgMusic.paused) {
            bgMusic.play();
          }
          const rect = btn.getBoundingClientRect();
          const x = rect.left + rect.width / 2;
          const y = rect.top + rect.height / 2;
          document.querySelectorAll(".option").forEach(b => b.style.pointerEvents = "none");

          if (option.correct) {

            playSound(correctSound);

            btn.classList.add("correct");
            animateGanesha("correct");
            score++;
            triggerConfetti(x, y);


            setGaneshaMood("happy");
          } else {

            playSound(wrongSound);

            btn.classList.add("wrong");
            triggerWrongEffect();
            animateGanesha("wrong");

            setGaneshaMood("sad");

            document.querySelectorAll(".option").forEach(b => {
              if (q.options.find(o => o.text === b.innerText && o.correct)) {
                b.classList.add("correct");
              }
            });
          }

          setTimeout(() => {
            current++;
            if (current < quiz.length) loadQuestion();
            else showResult();
          }, 1400);
        };

        optionsDiv.appendChild(btn);
      });
    }

    function showResult() {
      const card = document.getElementById("card");
      const resultScreen = document.getElementById("result-screen");

      // hide quiz UI
      card.style.display = "none";

      // calculate result
      let stars = "⭐";
      if (score >= 3) stars = "⭐⭐⭐";
      else if (score === 2) stars = "⭐⭐";

      let msg = score === 4 ? "Amazing!" : score >= 3 ? "Great Job!" : "Good Try!";

      // update UI
      document.getElementById("stars").innerText = stars;
      document.getElementById("result-text").innerText = msg;

      // show result screen
      resultScreen.classList.remove("hidden");

      // 🔊 RESULT AUDIO DESIGN

      // play main result sound
      playSound(resultSound);

      startBalloons();

      // Ganesha big celebration
      // const g = document.getElementById("ganesha");
      // g.style.transform = "scale(1.2)";
      // setGaneshaMood("celebrate");

      const g = document.getElementById("ganesha");
      g.style.display = "none"; // hide side ganesha

      // 🎉 celebration confetti (full screen)
      const duration = 1200;
      const end = Date.now() + duration;

      (function frame() {
        confetti({
          particleCount: 6,
          spread: 120,
          startVelocity: 20,
          origin: {
            x: Math.random(),
            y: Math.random() * 0.6
          }

        });

        if (Date.now() < end) {
          requestAnimationFrame(frame);
        }
      })();
    }


    function spawnEffect(html, x, y) {
      const layer = document.getElementById("effects-layer");

      const el = document.createElement("div");
      el.innerHTML = html;
      el.style.position = "absolute";
      el.style.left = x + "px";
      el.style.top = y + "px";

      layer.appendChild(el);

      setTimeout(() => el.remove(), 1000);
    }

    function triggerConfetti(x, y) {
      if (typeof confetti !== "function") return;

      const originX = x / window.innerWidth;
      const originY = y / window.innerHeight;

      // 💥 LOCAL BURST (button se)
      confetti({
        particleCount: 80,
        spread: 60,
        startVelocity: 45,
        origin: { x: originX, y: originY }
      });

      // 🎉 GLOBAL CELEBRATION (slight delay)
      setTimeout(() => {
        const duration = 800;
        const end = Date.now() + duration;

        (function frame() {
          confetti({
            particleCount: 5,
            spread: 120,
            startVelocity: 20,
            origin: {
              x: Math.random(),
              y: Math.random() * 0.5
            }
          });

          if (Date.now() < end) {
            requestAnimationFrame(frame);
          }
        })();
      }, 120);
    }

    function triggerWrongEffect() {
      const card = document.getElementById("card");

      // shake
      card.classList.add("shake");

      // flash
      card.classList.add("flash");

      // remove after animation
      setTimeout(() => {
        card.classList.remove("shake");
        card.classList.remove("flash");
      }, 300);
    }

    // 🎈 BALLOON SYSTEM
    function startBalloons() {
      const container = document.getElementById("balloons-container");

      const colors = [
        "#ff4d4d",
        "#ff9933",
        "#ffd633",
        "#66cc66",
        "#3399ff",
        "#cc66ff"
      ];

      let count = 0;

      const interval = setInterval(() => {
        if (count > 25) {
          clearInterval(interval);
          return;
        }

        const balloon = document.createElement("div");
        balloon.className = "balloon";

        // random position
        balloon.style.left = Math.random() * 100 + "%";

        // 🎯 DEPTH LAYERS
        const depth = Math.random();

        // size based on depth
        const size = 25 + depth * 50;
        balloon.style.width = size + "px";
        balloon.style.height = size * 1.3 + "px";

        // color
        const color = colors[Math.floor(Math.random() * colors.length)];
        balloon.style.setProperty("--color", color);

        // blur (far balloons blur more)
        balloon.style.setProperty("--blur", (1 - depth) * 3 + "px");

        // speed (far = slower, near = faster)
        const duration = 4 + (1 - depth) * 3;
        balloon.style.setProperty("--duration", duration + "s");

        // horizontal drift
        const drift = (Math.random() - 0.5) * 100; // -50px to +50px
        balloon.style.setProperty("--drift", drift + "px");

        container.appendChild(balloon);

        // cleanup
        setTimeout(() => balloon.remove(), duration * 1000);

        count++;
      }, 200);
    }

    loadQuestion();
  </script>

</body>

</html>
